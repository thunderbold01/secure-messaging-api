services:
  - type: web
    name: secure-messaging-api
    runtime: python
    repo: https://github.com/thunderbold01/secure-messaging-api
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secure-messaging-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ALLOWED_ORIGINS
        value: https://secure-messaging-api.onrender.com

databases:
  - name: secure-messaging-db
    databaseName: secure_messaging_db
    user: secure_messaging_user
    plan: free